version: "3.9"

# ── ClinicalNER docker-compose ────────────────────────────────────────────────
#
# Services:
#   clinicalner   — Flask API + NER pipeline
#   (optional)    — swap SQLite for postgres by uncommenting the db service
#
# Usage:
#   docker-compose up --build          # build + start
#   docker-compose up -d               # detached mode
#   docker-compose logs -f clinicalner # tail logs
#   docker-compose down                # stop and remove containers

services:
  clinicalner:
    build:
      context: ..           # build context = project root (one level up from docker/)
      dockerfile: docker/Dockerfile
    container_name: clinicalner
    ports:
      - "5000:5000"         # host:container
    volumes:
      # Persist SQLite database across container restarts
      - clinicalner_data:/app/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Optional: swap SQLite for PostgreSQL ─────────────────────────────────
  # Uncomment this block and update DataLoader to use SQLAlchemy with postgres
  # db:
  #   image: postgres:15-alpine
  #   container_name: clinicalner_db
  #   environment:
  #     POSTGRES_DB: clinicalner
  #     POSTGRES_USER: clinicalner
  #     POSTGRES_PASSWORD: changeme_in_production
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  clinicalner_data:
    driver: local
  # postgres_data:      # uncomment with postgres service
  #   driver: local
