name: Nightly Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC every day

env:
  PYTHON_VERSION: "3.11"
  SPACY_MODEL_URL: https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl
  # Quality-gate thresholds (matches DATA_QUALITY_PLAN.md)
  # Aligned with span-level evaluation on the built-in 30-note set (strict matching).
  F1_MIN: "0.80"
  PRECISION_MIN: "0.80"
  RECALL_MIN: "0.84"

jobs:
  benchmark:
    name: Run benchmark suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python setup with pip cache ─────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "${{ env.SPACY_MODEL_URL }}"

      # ── Core benchmark ──────────────────────────────────────────────────────
      - name: Run benchmark
        id: run_benchmark
        run: python run_benchmark.py

      # ── Quality gate ────────────────────────────────────────────────────────
      - name: Quality gate — fail if metrics below threshold
        # Runs even when run_benchmark fails so we get a clear gate annotation
        if: always()
        shell: python {0}
        run: |
          import json, sys, os

          results_path = "data/benchmark_results.json"
          try:
              with open(results_path) as f:
                  bm = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"::error::Cannot read benchmark results: {e}")
              sys.exit(1)

          if isinstance(bm, list):
              print("::error::benchmark_results.json must be envelope format (benchmark/v2). Run python run_benchmark.py")
              sys.exit(1)

          thresholds = {
              "f1":        float(os.environ["F1_MIN"]),
              "precision": float(os.environ["PRECISION_MIN"]),
              "recall":    float(os.environ["RECALL_MIN"]),
          }

          key_map = {
              "f1":        ["f1_score", "f1"],
              "precision": ["precision"],
              "recall":    ["recall"],
          }

          failures = []
          for metric, min_val in thresholds.items():
              actual = None
              for k in key_map[metric]:
                  if k in bm:
                      actual = bm[k]
                      break
              if actual is None:
                  print(f"::warning::Metric '{metric}' not found in results — skipping gate.")
                  continue
              if actual < min_val:
                  failures.append(f"{metric}={actual:.4f} (min={min_val})")

          if failures:
              print(f"::error::Quality gate FAILED: {', '.join(failures)}")
              print("Update models/model_registry.json and re-train before merging.")
              sys.exit(1)
          else:
              print(f"✅ Quality gate passed: {json.dumps({k: bm.get(v[0], bm.get(v[-1])) for k, v in key_map.items()}, indent=2)}")

      # ── Summary annotation ──────────────────────────────────────────────────
      - name: Annotate run summary
        if: always()
        shell: python {0}
        run: |
          import json, os, pathlib

          bm_path = pathlib.Path("data/benchmark_results.json")
          if not bm_path.exists():
              print("No benchmark_results.json to summarise.")
          else:
              bm = json.loads(bm_path.read_text())
              summary = pathlib.Path(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"))
              lines = [
                  "## 📊 Nightly Benchmark Results\n",
                  f"| Metric | Score |",
                  f"|--------|-------|",
                  f"| Precision | `{bm.get('precision', 'N/A')}` |",
                  f"| Recall    | `{bm.get('recall', 'N/A')}` |",
                  f"| F1 Score  | `{bm.get('f1_score') or bm.get('f1', 'N/A')}` |",
                  f"| Test set  | `{bm.get('test_notes') or bm.get('test_set_size', 'N/A')}` notes |",
              ]
              summary.write_text("\n".join(lines))
        env:
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}

      # ── Artefact upload ─────────────────────────────────────────────────────
      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: |
            data/benchmark_results.json
            data/BENCHMARKS.md
          retention-days: 30
