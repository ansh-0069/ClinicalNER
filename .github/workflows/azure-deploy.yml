name: CI/CD → DockerHub → Azure

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: azure-deploy-main
  cancel-in-progress: true

jobs:
  # ── Job 1: Tests must pass before we deploy ───────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-fail-under=75 tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Build → DockerHub → Azure (only runs if tests pass) ────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test          # ← gates deploy on test success
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set deployment tag
        id: meta
        run: echo "tag=v$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Validate and normalize Docker Hub username
        id: docker_user
        shell: bash
        run: |
          RAW='${{ secrets.DOCKERHUB_USERNAME }}'
          CLEANED="$(echo "$RAW" | tr -d '\r' | xargs)"

          if [ -z "$CLEANED" ]; then
            echo "::error::DOCKERHUB_USERNAME secret is empty or whitespace."
            exit 1
          fi

          if ! [[ "$CLEANED" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]]; then
            echo "::error::DOCKERHUB_USERNAME contains invalid characters after normalization."
            exit 1
          fi

          echo "value=$CLEANED" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.docker_user.outputs.value }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.docker_user.outputs.value }}/clinicalner:${{ steps.meta.outputs.tag }}
            ${{ steps.docker_user.outputs.value }}/clinicalner:latest
          cache-from: type=registry,ref=${{ steps.docker_user.outputs.value }}/clinicalner:latest
          cache-to:   type=inline

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Point Web App to new image tag
        run: |
          az webapp config container set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name           "$AZURE_WEBAPP_NAME" \
            --container-image-name "${{ steps.docker_user.outputs.value }}/clinicalner:${{ steps.meta.outputs.tag }}" \
            --container-registry-url "https://index.docker.io"

      - name: Apply required app settings
        run: |
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name           "$AZURE_WEBAPP_NAME" \
            --settings \
            DB_PATH="${{ secrets.DB_PATH }}" \
            ADMIN_BACKFILL_TOKEN="${{ secrets.ADMIN_BACKFILL_TOKEN }}" \
            ADMIN_REQUIRE_USER_HEADER="true"

      - name: Restart web app
        run: |
          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name           "$AZURE_WEBAPP_NAME"

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.docker_user.outputs.value }}/clinicalner:${{ steps.meta.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | ${{ secrets.AZURE_WEBAPP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
