name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  SPACY_MODEL_URL: >-
    https://github.com/explosion/spacy-models/releases/download/
    en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "${{ env.SPACY_MODEL_URL }}"
          # Optional text-extraction libs (not in requirements.txt); needed so PDF/DOCX tests run and coverage clears 75%.
          pip install pdfminer.six python-docx

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=75 tests/
