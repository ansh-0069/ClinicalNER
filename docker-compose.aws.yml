version: '3.8'

# AWS ECS/Fargate deployment configuration
# Use with: docker-compose -f docker-compose.aws.yml up

services:
  clinicalner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/clinicalner:latest
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - AWS_REGION=${AWS_REGION}
      - DB_PATH=/app/data/clinicalner.db
    volumes:
      - efs-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: awslogs
      options:
        awslogs-group: /ecs/clinicalner
        awslogs-region: ${AWS_REGION}
        awslogs-stream-prefix: ecs

  # Optional: PostgreSQL for production
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: clinicalner
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  efs-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${EFS_DNS_NAME},nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2
      device: ":/"
  postgres-data:

networks:
  default:
    driver: bridge
