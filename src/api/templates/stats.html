<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats · ClinicalNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #FAFAF8;
  --surface:   #FFFFFF;
  --text:      #0A0A0A;
  --text-mid:  #525252;
  --text-dim:  #A3A3A3;
  --border:    #E5E5E5;
  --accent:    #FF3B30;
  --accent-dim: rgba(255,59,48,0.08);
  --shadow:    0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-bottom: 120px;
}

h1, h2 {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
}

.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 60px 40px;
}

.hero {
  margin-bottom: 64px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.hero-title {
  font-size: 56px;
  font-weight: 900;
  margin-bottom: 12px;
  letter-spacing: -0.03em;
}

.hero-subtitle {
  font-size: 18px;
  color: var(--text-mid);
  font-weight: 400;
  max-width: 600px;
}

.hero-actions {
  display: flex;
  gap: 16px;
  margin-top: 24px;
}

.btn {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  padding: 12px 24px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}

.btn:hover {
  background: var(--text);
  color: var(--surface);
  border-color: var(--text);
}

.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--surface);
}

.btn-accent:hover {
  background: var(--text);
  border-color: var(--text);
}

.section {
  margin-bottom: 48px;
}

.section-title {
  font-size: 24px;
  margin-bottom: 20px;
  font-family: 'Playfair Display', serif;
}

.json-container {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 32px;
  overflow-x: auto;
}

pre {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.key {
  color: var(--accent);
  font-weight: 600;
}

.string {
  color: var(--text-mid);
}

.number {
  color: var(--text);
  font-weight: 600;
}

.loading {
  text-align: center;
  padding: 64px;
  color: var(--text-dim);
  font-size: 14px;
}

.error {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  padding: 20px 24px;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 32px;
}

/* Bottom Dock */
.dock {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 16px;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
}

.dock-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px 20px;
  text-decoration: none;
  color: var(--text-mid);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid transparent;
  position: relative;
}

.dock-item:hover {
  transform: translateY(-4px);
  color: var(--text);
}

.dock-item.active {
  color: var(--accent);
  border-color: var(--accent);
}

.dock-item.active::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
}

.dock-icon {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  stroke-width: 1.5;
  fill: none;
}

.dock-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

@media (max-width: 768px) {
  .page { padding: 40px 24px; }
  .hero-title { font-size: 40px; }
  .dock { bottom: 16px; padding: 8px 12px; }
  .dock-item { padding: 8px 12px; }
}
</style>
</head>
<body>

<div class="page">
  <div class="hero">
    <h1 class="hero-title">Pipeline Statistics</h1>
    <p class="hero-subtitle">Real-time JSON data from the ClinicalNER processing pipeline.</p>
    <div class="hero-actions">
      <button class="btn btn-accent" onclick="copyToClipboard()">Copy JSON</button>
      <button class="btn" onclick="downloadJSON()">Download JSON</button>
      <button class="btn" onclick="location.reload()">Refresh</button>
    </div>
  </div>

  <div id="error-container"></div>

  <div class="section">
    <h2 class="section-title">JSON Response</h2>
    <div class="json-container">
      <pre id="json-output" class="loading">Loading statistics...</pre>
    </div>
  </div>
</div>

<!-- Bottom Dock -->
<nav class="dock">
  <a href="/dashboard" class="dock-item">
    <svg class="dock-icon" viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span class="dock-label">Dashboard</span>
  </a>
  <a href="/api-explorer" class="dock-item">
    <svg class="dock-icon" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    <span class="dock-label">API</span>
  </a>
  <a href="/stats" class="dock-item active">
    <svg class="dock-icon" viewBox="0 0 24 24">
      <path d="M3 3v18h18"/>
      <path d="M18 17V9"/>
      <path d="M13 17V5"/>
      <path d="M8 17v-3"/>
    </svg>
    <span class="dock-label">Stats</span>
  </a>
  <a href="/report/summary" class="dock-item" target="_blank">
    <svg class="dock-icon" viewBox="0 0 24 24">
      <path d="M9 3h6"/>
      <path d="M10 8h4"/>
      <rect x="5" y="3" width="14" height="18" rx="2"/>
      <path d="M9 12h6"/>
      <path d="M9 16h6"/>
    </svg>
    <span class="dock-label">Report</span>
  </a>
</nav>

<script>
let statsData = null;

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    
    if (data.error) {
      throw new Error(data.error);
    }
    
    statsData = data;
    const formatted = JSON.stringify(data, null, 2);
    document.getElementById('json-output').textContent = formatted;
    
  } catch(e) {
    document.getElementById('error-container').innerHTML = 
      `<div class="error">⚠ Failed to load statistics: ${e.message}</div>`;
    document.getElementById('json-output').textContent = 'Error loading data';
  }
}

function copyToClipboard() {
  const text = document.getElementById('json-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = original, 2000);
  });
}

function downloadJSON() {
  if (!statsData) return;
  
  const blob = new Blob([JSON.stringify(statsData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `clinicalner-stats-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

loadStats();
</script>
</body>
</html>
