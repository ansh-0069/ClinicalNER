<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicalNER - Review Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=IBM+Plex+Mono:wght@300;400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#060708;
  --paper:#f2f4ef;
  --line:rgba(242,244,239,.14);
  --muted:rgba(242,244,239,.62);
  --signal:#c8ff45;
  --soft:rgba(200,255,69,.12);
  --danger:#ff7d7d;
  --ok:#64e291;
  --mono:"IBM Plex Mono",monospace;
  --display:"Fraunces",serif;
  --sans:"Instrument Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);
  background:
    radial-gradient(1200px 680px at 88% -10%,rgba(200,255,69,.12),transparent 62%),
    radial-gradient(920px 520px at -10% 38%,rgba(82,114,255,.14),transparent 58%),
    var(--ink);
  color:var(--paper);
  padding:4.5rem 5vw 110px;
}
.hero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--signal)}
.hero h1{margin-top:10px;font-family:var(--display);font-size:clamp(42px,8vw,98px);line-height:.9;letter-spacing:-.03em}
.hero p{margin-top:14px;max-width:64ch;color:var(--muted);line-height:1.7}
.controls{
  margin-top:20px;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
input, textarea, button {
  font-family:var(--mono);
  font-size:12px;
  border:1px solid var(--line);
  background:rgba(14,16,18,.92);
  color:var(--paper);
  padding:10px 12px;
}
input, textarea { outline:none; }
input:focus-visible, textarea:focus-visible, button:focus-visible {
  outline:2px solid rgba(200,255,69,.72);
  outline-offset:2px;
}
button{cursor:pointer;text-transform:uppercase;letter-spacing:.1em;font-size:10px}
button:hover{background:var(--soft);border-color:rgba(200,255,69,.45)}
button.primary{background:var(--signal);color:#111510;border-color:transparent;font-weight:700}
.summary {
  margin-top:24px;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:1px;
  background:var(--line);
}
.metric{background:rgba(10,12,13,.96);padding:16px}
.metric .k{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(242,244,239,.45)}
.metric .v{margin-top:8px;font-family:var(--display);font-size:clamp(26px,4vw,52px);line-height:.95;color:var(--signal)}
.queue {
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.card{
  border:1px solid var(--line);
  background:rgba(10,12,13,.96);
  padding:14px;
}
.card-head{display:flex;justify-content:space-between;gap:8px;align-items:center}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 8px;border:1px solid rgba(255,125,125,.42);color:var(--danger);background:rgba(255,125,125,.1)}
.meta{margin-top:8px;font-family:var(--mono);font-size:11px;color:rgba(242,244,239,.75)}
.preview{
  margin-top:10px;
  border:1px solid var(--line);
  background:rgba(16,18,20,.95);
  font-family:var(--mono);
  font-size:12px;
  line-height:1.65;
  color:rgba(242,244,239,.88);
  padding:10px;
  max-height:220px;
  overflow:auto;
  white-space:pre-wrap;
  word-break:break-word;
}
.actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.actions button[data-decision="approved"]{border-color:rgba(100,226,145,.45);color:var(--ok)}
.empty{
  margin-top:24px;
  border:1px solid var(--line);
  background:rgba(10,12,13,.95);
  padding:20px;
  color:var(--muted);
  font-family:var(--mono);
}
.error{
  margin-top:14px;
  border:1px solid rgba(255,125,125,.45);
  background:rgba(255,125,125,.1);
  color:#ffb0b0;
  font-family:var(--mono);
  padding:10px 12px;
  font-size:12px;
}
@media(max-width:980px){.queue{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:680px){.summary{grid-template-columns:1fr}}
</style>
</head>
<body>
{% include "_ops_shell.html" %}

<section class="hero">
  <div class="eyebrow">Human In The Loop</div>
  <h1>Review Queue</h1>
  <p>Process high-risk notes with manual decisions and keep an auditable trail for clinical quality review.</p>
  <div class="controls">
    <input id="reviewer" type="text" placeholder="Reviewer name (required for traceability)" value="clinical.reviewer@company.com" style="min-width:320px;">
    <button id="refresh" class="primary" type="button">Refresh Queue</button>
  </div>
</section>

<section class="summary">
  <article class="metric"><div class="k">Pending High Risk</div><div class="v" id="m-pending">0</div></article>
  <article class="metric"><div class="k">Approved</div><div class="v" id="m-approved">0</div></article>
  <article class="metric"><div class="k">Edited</div><div class="v" id="m-edited">0</div></article>
  <article class="metric"><div class="k">Rejected</div><div class="v" id="m-rejected">0</div></article>
</section>

<div id="error-box"></div>
<div id="queue-root" class="queue"></div>
<div id="empty-root" class="empty" style="display:none;">No notes currently require manual review. Queue is clear.</div>

<script>
const queueRoot = document.getElementById('queue-root');
const emptyRoot = document.getElementById('empty-root');
const errorBox = document.getElementById('error-box');
const reviewerInput = document.getElementById('reviewer');

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function shortText(text, maxLen = 900) {
  const t = String(text || '');
  if (t.length <= maxLen) return t;
  return t.slice(0, maxLen) + '\n\n[truncated for queue view]';
}

function setError(message) {
  if (!message) {
    errorBox.innerHTML = '';
    return;
  }
  errorBox.innerHTML = '<div class="error">' + escapeHtml(message) + '</div>';
}

function setSummary(summary) {
  const byDecision = summary.by_decision || {};
  document.getElementById('m-pending').textContent = Number(summary.pending || 0).toLocaleString();
  document.getElementById('m-approved').textContent = Number(byDecision.approved || 0).toLocaleString();
  document.getElementById('m-edited').textContent = Number(byDecision.edited || 0).toLocaleString();
  document.getElementById('m-rejected').textContent = Number(byDecision.rejected || 0).toLocaleString();
}

function renderQueue(items) {
  queueRoot.innerHTML = '';
  if (!items.length) {
    emptyRoot.style.display = 'block';
    return;
  }
  emptyRoot.style.display = 'none';

  for (const item of items) {
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = [
      '<div class="card-head">',
      '  <strong>Note #' + escapeHtml(item.note_id) + '</strong>',
      '  <span class="badge">High Risk</span>',
      '</div>',
      '<div class="meta">Entities: ' + escapeHtml(item.entity_count) + ' | Processed: ' + escapeHtml(item.processed_at || '-') + '</div>',
      '<div class="preview">' + escapeHtml(shortText(item.masked_text || '')) + '</div>',
      '<textarea data-comments rows="3" placeholder="Optional reviewer comment..."></textarea>',
      '<div class="actions">',
      '  <button data-decision="approved" type="button">Approve</button>',
      '  <button data-decision="edited" type="button">Mark Edited</button>',
      '  <button data-decision="rejected" type="button">Reject</button>',
      '</div>'
    ].join('');

    card.querySelectorAll('[data-decision]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const reviewer = reviewerInput.value.trim();
        if (!reviewer) {
          setError('Reviewer name is required before submitting decisions.');
          return;
        }

        btn.disabled = true;
        const previous = btn.textContent;
        btn.textContent = 'Saving...';

        const comments = card.querySelector('[data-comments]').value.trim();
        try {
          const res = await fetch('/api/review/decision', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              note_id: item.note_id,
              decision: btn.dataset.decision,
              reviewer,
              comments
            })
          });

          const payload = await res.json();
          if (!res.ok || payload.error) {
            throw new Error(payload.error || 'Failed to submit decision');
          }

          await refreshAll();
        } catch (err) {
          setError(err.message || 'Decision submission failed');
          btn.disabled = false;
          btn.textContent = previous;
        }
      });
    });

    queueRoot.appendChild(card);
  }
}

async function refreshAll() {
  setError('');
  try {
    const [queueRes, summaryRes] = await Promise.all([
      fetch('/api/review/queue?limit=100'),
      fetch('/api/review/summary')
    ]);

    const queuePayload = await queueRes.json();
    const summaryPayload = await summaryRes.json();

    if (!queueRes.ok || queuePayload.error) {
      throw new Error(queuePayload.error || 'Unable to load review queue');
    }
    if (!summaryRes.ok || summaryPayload.error) {
      throw new Error(summaryPayload.error || 'Unable to load review summary');
    }

    renderQueue(queuePayload.items || []);
    setSummary(summaryPayload);
  } catch (err) {
    renderQueue([]);
    setSummary({ pending: 0, by_decision: {} });
    setError(err.message || 'Failed to refresh queue');
  }
}

document.getElementById('refresh').addEventListener('click', refreshAll);
refreshAll();
</script>
</body>
</html>
